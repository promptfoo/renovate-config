name: CI Success

on:
  pull_request:

jobs:
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: read
      statuses: read
    steps:
      - name: Wait for all PR checks
        uses: promptfoo/.github/.github/actions/ci-success@06453faf6e513174f5ee0b340bac7cdfa41bf437 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          timeout-seconds: 300
